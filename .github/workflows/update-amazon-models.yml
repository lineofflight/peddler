name: Update Amazon API models

on:
  schedule:
    # Run daily at 2:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
    # Allow manual trigger from GitHub UI

permissions:
  contents: read

jobs:
  update-api:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          bundler-cache: true

      - name: Install dependencies
        run: bundle install

      - name: Generate code from API models
        run: bundle exec rake generate

      - name: Create Pull Request
        id: create-pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BOT_PAT }}
          script: |
            const { execSync } = require('child_process');

            // Check for changes
            const status = execSync('git status --porcelain', { encoding: 'utf8' });
            if (!status.trim()) {
              console.log('No changes');
              return;
            }

            // Configure git
            execSync('git config user.name "lineoffligbt"');
            execSync('git config user.email "4628864+lineoffligbt@users.noreply.github.com"');

            // Use fixed branch name and handle existing branch
            const branchName = 'update-api-models';

            // Delete remote branch if it exists
            try {
              execSync(`git push origin --delete ${branchName}`, { stdio: 'ignore' });
            } catch (e) {
              // Branch doesn't exist remotely, that's fine
            }

            // Delete local branch if it exists
            try {
              execSync(`git branch -D ${branchName}`, { stdio: 'ignore' });
            } catch (e) {
              // Branch doesn't exist locally, that's fine
            }

            execSync(`git checkout -b ${branchName}`);
            execSync('git add -A');
            execSync('git commit -m "Update Amazon models"');
            execSync(`git push --set-upstream origin ${branchName}`);

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Update Amazon models',
              body: 'Summarizing changes...',
              head: branchName,
              base: 'main'
            });

            console.log(`Created PR #${pr.number}: ${pr.html_url}`);
            core.setOutput('pr_number', pr.number);

      - name: Install Claude Code
        if: steps.create-pr.outputs.pr_number
        run: curl -fsSL https://claude.ai/install.sh | bash

      - name: Summarize changes
        if: steps.create-pr.outputs.pr_number
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.BOT_PAT }}
        run: |
          ~/.local/bin/claude --print \
            --max-turns 5 \
            --allowedTools 'Read' 'Glob' 'Grep' 'Bash(gh pr diff:*)' 'Bash(gh pr edit:*)' \
            --system-prompt 'Relaxed, direct, still professional tone. Be concise. No emojis.' \
            "A nightly job has pulled in the latest Amazon SP-API specs and regenerated code. Review the diff in PR #${{ steps.create-pr.outputs.pr_number }} and update its description with a summary of what's new, removed, or breaking. Use plain text only."
