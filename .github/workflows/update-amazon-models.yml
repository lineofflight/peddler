name: Update Amazon API models

on:
  schedule:
    # Run daily at 2:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
    # Allow manual trigger from GitHub UI

permissions:
  contents: read

jobs:
  update-api:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          bundler-cache: true

      - name: Install dependencies
        run: bundle install

      - name: Generate code from API models
        run: bundle exec rake generate

      - name: Create Pull Request
        id: create-pr
        uses: actions/github-script@v7
        env:
          MACHINE_USER_NAME: ${{ vars.MACHINE_USER_NAME }}
          MACHINE_USER_EMAIL: ${{ vars.MACHINE_USER_EMAIL }}
        with:
          github-token: ${{ secrets.MACHINE_USER_PAT }}
          script: |
            const { execSync } = require('child_process');

            // Check for changes
            const status = execSync('git status --porcelain', { encoding: 'utf8' });
            if (!status.trim()) {
              console.log('No changes');
              return;
            }

            // Configure git
            execSync(`git config user.name "${process.env.MACHINE_USER_NAME}"`);
            execSync(`git config user.email "${process.env.MACHINE_USER_EMAIL}"`);

            // Use fixed branch name and handle existing branch
            const branchName = 'update-api-models';

            // Delete remote branch if it exists
            try {
              execSync(`git push origin --delete ${branchName}`, { stdio: 'ignore' });
            } catch (e) {
              // Branch doesn't exist remotely, that's fine
            }

            // Delete local branch if it exists
            try {
              execSync(`git branch -D ${branchName}`, { stdio: 'ignore' });
            } catch (e) {
              // Branch doesn't exist locally, that's fine
            }

            execSync(`git checkout -b ${branchName}`);
            execSync('git add -A');
            execSync('git commit -m "Update Amazon models"');
            execSync(`git push --set-upstream origin ${branchName}`);

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Update Amazon models',
              body: 'Summarizing changes...',
              head: branchName,
              base: 'main'
            });

            console.log(`Created PR #${pr.number}: ${pr.html_url}`);
            core.setOutput('pr_number', pr.number);

      - name: Summarize changes
        if: steps.create-pr.outputs.pr_number
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ steps.create-pr.outputs.pr_number }}

            A nightly job has pulled in the latest Amazon SP-API specs and regenerated code. Review the diff and update the PR description with a concise summary of what's new, removed, or breaking. Use plain text only, no markdown. The description will become a squash commit message.
          claude_args: |
            --model sonnet
            --allowedTools "Bash(gh pr diff:*),Bash(gh pr edit:*),Bash(gh pr view:*)"
            --system-prompt "Relaxed, direct, still professional tone. Be concise. No emojis."
